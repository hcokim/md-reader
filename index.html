<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>md reader</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.21/dist/katex.min.css" />
  </head>
  <body data-theme="github" data-width="medium" data-color-mode="light">

    <!-- State A: Landing -->
    <div id="landing">
      <div class="landing-inner">
        <svg class="landing-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
          <rect x="12" y="4" width="40" height="52" rx="4" stroke="currentColor" stroke-width="2.5" fill="none"/>
          <path d="M22 20h20M22 28h20M22 36h14" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          <path d="M32 46 l0 10M26 52 l6 6 l6-6" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <h1 class="landing-title">Drop a Markdown file here</h1>
        <p class="landing-sub">or <a href="#" id="open-link">click to open</a></p>
        <form id="url-form" autocomplete="off">
          <input type="url" id="url-input" placeholder="Paste a URL" aria-label="Paste a URL" />
        </form>
      </div>
      <input type="file" id="file-input" accept=".md,.markdown,.mdx,.txt" multiple hidden />
    </div>

    <!-- State B: Reader -->
    <div id="reader" class="hidden">
      <div id="sidebar-backdrop" class="hidden"></div>
      <aside id="file-sidebar" class="hidden" aria-label="Navigation">
        <div id="file-list" class="hidden"></div>
        <div id="outline-list" class="hidden"></div>
      </aside>
      <div id="reader-main">
        <div id="content"></div>
      </div>
    </div>

    <button id="sidebar-toggle" class="hidden" type="button" aria-label="Toggle sidebar">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="3" width="18" height="18" rx="2"/>
        <line x1="9" y1="3" x2="9" y2="21"/>
      </svg>
    </button>

    <button id="present-toggle" class="hidden" type="button" aria-label="Present">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polygon points="6,3 20,12 6,21" fill="currentColor" stroke="none"/>
      </svg>
    </button>

    <!-- Presentation overlay -->
    <div id="present-overlay" class="hidden">
      <div id="present-close-zone">
        <button id="present-close" type="button" aria-label="Exit presentation">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="18" y1="6" x2="6" y2="18"/>
            <line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>
      </div>
      <div id="present-slide"></div>
      <nav id="present-nav">
        <button id="present-sidebar-toggle" type="button" aria-label="Toggle outline">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="3" width="18" height="18" rx="2"/>
            <line x1="9" y1="3" x2="9" y2="21"/>
          </svg>
        </button>
        <div id="present-counter"></div>
        <div id="present-dots"></div>
      </nav>
      <aside id="present-sidebar" class="hidden"></aside>
      <div id="present-sidebar-backdrop" class="hidden"></div>
      <div id="present-tooltip" class="hidden"></div>
    </div>

    <!-- Settings toggle + panel -->
    <button id="settings-toggle" class="hidden" type="button" aria-label="Settings">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="3"/>
        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
      </svg>
    </button>

    <div id="settings-panel" class="hidden">
      <div class="control-group">
        <label>Theme</label>
        <select id="theme-select">
          <option value="github">GitHub</option>
          <option value="serif">Serif</option>
          <option value="sans">Sans</option>
          <option value="mono">Mono</option>
        </select>
      </div>
      <div class="control-group">
        <label>Mode</label>
        <select id="color-mode-select">
          <option value="auto">Auto</option>
          <option value="light">Light</option>
          <option value="dark">Dark</option>
        </select>
      </div>
      <div class="control-group">
        <label>Width</label>
        <select id="width-select">
          <option value="narrow">Narrow</option>
          <option value="medium" selected>Medium</option>
          <option value="wide">Wide</option>
        </select>
      </div>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
