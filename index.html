<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>md reader</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.21/dist/katex.min.css" />
  </head>
  <body data-theme="github" data-width="medium">

    <!-- State A: Landing -->
    <div id="landing">
      <div class="landing-inner">
        <svg class="landing-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
          <rect x="12" y="4" width="40" height="52" rx="4" stroke="currentColor" stroke-width="2.5" fill="none"/>
          <path d="M22 20h20M22 28h20M22 36h14" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          <path d="M32 46 l0 10M26 52 l6 6 l6-6" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <h1 class="landing-title">Drop a Markdown file here</h1>
        <p class="landing-sub">or <a href="#" id="open-link">click to open</a></p>
      </div>
      <input type="file" id="file-input" accept=".md,.markdown,.mdx,.txt" hidden />
    </div>

    <!-- State B: Reader -->
    <div id="reader" class="hidden">
      <div id="content"></div>
    </div>

    <!-- Control bar -->
    <div id="controls" class="hidden">
      <div class="control-group">
        <label>Theme</label>
        <select id="theme-select">
          <option value="github">GitHub</option>
          <option value="serif">Serif</option>
          <option value="sans">Sans</option>
          <option value="mono">Mono</option>
        </select>
      </div>
      <div class="control-group">
        <label>Width</label>
        <select id="width-select">
          <option value="narrow">Narrow</option>
          <option value="medium" selected>Medium</option>
          <option value="wide">Wide</option>
        </select>
      </div>
      <button id="open-btn" type="button">Open file</button>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
